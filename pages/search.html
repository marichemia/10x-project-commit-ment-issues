<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-top">
                <img src="../images/library-icon.svg" alt="My Library" class="library-icon" />
                <span class="sidebar-title">My Library</span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/pins-icon.svg" alt="Pins icon" class="sidebar-icon">
                                <span class="sidebar-text">Pins</span>
                            </div>
                            <span><img src="../images/arrow-icon.svg" alt="Arrow Icon" class="sidebar-arrow"></span>
                        </a>
                    </li>
                   
                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/playlists-icon.svg" alt="Playlists icon" class="sidebar-icon">
                                <span class="sidebar-text">Playlists</span>
                            </div>
                            <span><img src="../images/arrow-icon.svg" alt="Arrow Icon" class="sidebar-arrow"></span>
                        </a>
                    </li>

                   <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/liked-songs-icon.svg" alt="Liked Songs icon" class="sidebar-icon">
                                <span class="sidebar-text">Liked Songs</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/saves-icon.svg" alt="Saves icon" class="sidebar-icon">
                                <span class="sidebar-text">Saves</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/albums-icon.svg" alt="Albums icon" class="sidebar-icon">
                                <span class="sidebar-text">Albums</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/folders-icon.svg" alt="Folders icon" class="sidebar-icon">
                                <span class="sidebar-text">Folders</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/podcasts-icon.svg" alt="Podcasts icon" class="sidebar-icon">
                                <span class="sidebar-text">Podcasts</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/audiobooks-icon.svg" alt="Audiobooks icon" class="sidebar-icon">
                                <span class="sidebar-text">Audiobooks</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="../images/artists-icon.svg" alt="Artists icon" class="sidebar-icon">
                                <span class="sidebar-text">Artists</span>
                            </div>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
        <div class="content-wrapper">
            <header class="header">
                <div class="header-left-container">
                    <nav>
                        <a href="#" class="header-nav-link" id="home-link-active">
                            <img src="../images/home-active-icon.svg" alt="Home Icon" class="home-icon">
                            <span>Home</span>
                        </a>
                        <a href="#" class="header-nav-link">
                            <img src="../images/discover-icon.svg" alt="Discover Icon" class="discover-icon">
                            <span>Discover</span>
                        </a>
                    </nav>
                    <form class="header-search">
                        <img src="../images/search-icon.svg" alt="" class="search-icon">
                        <input type="text" placeholder="Search" class="search-input">
                    </form>
                </div>
                <div class="header-right-container">
                    <button class="header-icon-btn">
                        <img src="../images/notification-icon.svg" alt="Notifications">
                    </button>

                    <button class="header-icon-btn">
                        <img src="../images/lock-icon.svg" alt="Security">
                    </button>

                    <button class="header-icon-btn">
                        <img src="../images/friends-icon.svg" alt="Friends">
                    </button>

                    <button class="header-icon-btn">
                        <img src="../images/settings-icon.svg" alt="Settings">
                    </button>

                    <button class="header-icon-btn">
                        <img src="../images/profile-icon.svg" alt="Profile" class="header-avatar">
                    </button>
                </div>
            </header>
           <main class="main-content">
                
                <!-- Search Page Content would go here  -->
                <div class="search-wrapper">
                  <h3>Recent searches</h3>
                  <img src="/images/more.png" alt="see-more">
                </div>
                <section class="recent-searches">
                    
                    <div class="image-wrapper">
                        <div class="card1">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>Daft Punk</h4>
                    </div>
                    <div class="image-wrapper">
                        <div class="card2">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>David Bowie</h4>
                    </div>
                    <div class="image-wrapper">
                        <div class="card3">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>Black Holes...</h4>
                        <p>Muse</p>
                    </div>
                </section>
                <!-- there is discover section -->

                <h3>Browse all</h3>
                <section class="discover">
                     <div class="discover-wrapper">
                        <p>Discover</p>
                         <img src="/images/arrows.png" alt="arrows">
                    </div>
                    <div class="boxes">
                        <img src="/images/made-for-you.png" alt="made-for-you">
                        <img src="/images/new-releases.png" alt="new-releases">
                        <img src="/images/spotify-classics.png" alt="spotify-classics">
                        <img src="/images/charts.png" alt="charts">
                        <img src="/images/trending.png" alt="trending">
                        <img src="/images/discover.png" alt="discover">
                        <img src="/images/spotify-singles.png" alt="spotify-singles">
                        <img src="/images/decades.png" alt="decades">
                    </div>
                </section>
               <!-- there is section for Gerns -->

                <div class="genrs-wrapper">
                    <p>Genrs</p>
                    <img src="/images/arrows.png" alt="arrows">
                </div>
                <section class="genrs">
                    <div class="boxes">
                        <img src="/images/pop.png" alt="pop">
                        <img src="/images/country.png" alt="country">
                        <img src="/images/hip-hop.png" alt="hip-hop">
                        <img src="/images/rock.png" alt="rock">
                        <img src="/images/indie.png" alt="indie">
                        <img src="/images/punk.png" alt="punk">
                        <img src="/images/metal.png" alt="metal">
                        <img src="/images/instrumental.png" alt="instrumental">
                    </div>
                </section>
            </main> 
            <footer class="footer">
                <div class="footer-left-group">
                    <div class="player-controls">
                        <img src="../images/play-icon.svg" alt="play/pause">
                        <img src="../images/prev-icon.svg" alt="skip back">
                        <img src="../images/next-icon.svg" alt="skip forward">
                        <img src="../images/shuffle-icon.svg" alt="shuffle">
                        <img src="../images/repeat-icon.svg" alt="repeat">
                        <div class="play-progress">
                            <div class="runtime">2:23</div>
                            <div class="progress-bar">
                                <div class="progress"></div>
                            </div>
                            <div class="duration">4:45</div>
                        </div>
                        <img src="../images/volume-icon.svg" alt="volume">
                    </div>
                    <div class="song-playing">
                        <img src="../images/song-image-icon.png" alt="cover">
                        <div class="song-info">
                            <div class="song-title">Get Lucky</div>
                            <div class="artist">Daft Punk</div>
                            <div class="album">Random Access Memories</div>
                        </div>
                    </div>
                </div>
                <div class="other-controls">
                    <img src="../images/like-icon.svg" alt="Add to Liked Songs">
                    <img src="../images/add-icon.svg" alt="Add to Playlist">
                    <img src="../images/lyrics-icon.svg" alt="Song Lyrics">
                    <img src="../images/pc-icon.svg" alt="Device">
                    <img src="../images/more-icon.svg" alt="More Options">
                    <div class="line"></div>
                    <img src="../images/dj-icon.svg" alt="DJ">
                    <img src="../images/queue-icon.svg" alt="Queue">
                </div>
                 <img src="../images/more-icon.svg" class="none more-menu" alt="More Options">
            </footer>
        </div>
    </div> 
</body>
</html>
