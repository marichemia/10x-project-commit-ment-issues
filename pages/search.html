<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar"></aside>
        <div class="content-wrapper">
            <header class="header"></header>
           <main class="main-content">
                
                <!-- Search Page Content would go here  -->
                <div class="search-wrapper">
                  <h3>Recent searches</h3>
                  <img src="/images/more.png" alt="see-more">
                </div>
                <section class="recent-searches">
                    
                    <div class="image-wrapper">
                        <div class="card1">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>Daft Punk</h4>
                    </div>
                    <div class="image-wrapper">
                        <div class="card2">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>David Bowie</h4>
                    </div>
                    <div class="image-wrapper">
                        <div class="card3">
                            <img src="/images/X.png" alt="exit">
                        </div>
                        <h4>Black Holes...</h4>
                        <p>Muse</p>
                    </div>
                </section>
                <!-- there is discover section -->

                <h3>Browse all</h3>
                <section class="discover">
                     <div class="discover-wrapper">
                        <p>Discover</p>
                         <img src="/images/arrows.png" alt="arrows">
                    </div>
                    <div class="boxes">
                        <img src="/images/made-for-you.png" alt="made-for-you">
                        <img src="/images/new-releases.png" alt="new-releases">
                        <img src="/images/spotify-classics.png" alt="spotify-classics">
                        <img src="/images/charts.png" alt="charts">
                        <img src="/images/trending.png" alt="trending">
                        <img src="/images/discover.png" alt="discover">
                        <img src="/images/spotify-singles.png" alt="spotify-singles">
                        <img src="/images/decades.png" alt="decades">
                    </div>
                </section>
               <!-- there is section for Gerns -->

                <div class="genrs-wrapper">
                    <p>Genrs</p>
                    <img src="/images/arrows.png" alt="arrows">
                </div>
                <section class="genrs">
                    <div class="boxes">
                        <img src="/images/pop.png" alt="pop">
                        <img src="/images/country.png" alt="country">
                        <img src="/images/hip-hop.png" alt="hip-hop">
                        <img src="/images/rock.png" alt="rock">
                        <img src="/images/indie.png" alt="indie">
                        <img src="/images/punk.png" alt="punk">
                        <img src="/images/metal.png" alt="metal">
                        <img src="/images/instrumental.png" alt="instrumental">
                    </div>
                </section>
            </main> 
            <footer class="footer"></footer>
        </div>
    </div> 
</body>
</html>
