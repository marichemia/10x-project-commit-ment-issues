<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar"></aside>
        <div class="content-wrapper">
            <header class="header"></header>
            <main class="main-content">
                <!--Search Page Content would go here -->
                <section class="resent-searches">
                    <h3>Recent searches</h3>
                    <div class="image-wrapper1">
                        <div class="card1"></div>
                        <h4>Duft Punk</h4>
                    </div>
                    <div class="image-wrapper2">
                        <div class="card2"></div>
                        <h4>David Bowie</h4>
                    </div>
                    <div class="image-wrapper3">
                        <h4>Black Holes...</h4>
                        <p>Muse</p>
                    </div>
                </section>
                <!-- there is discover section -->
                <h3>Browse all</h3>
                <p>Discover</p>
                <section class="discover">
                    <div class="box1">
                        <h3>Made For You</h3>
                    </div>
                    <div class="box2">
                        <h3>New Release</h3>
                    </div>
                    <div class="box3">
                        <h3>Spotify Classics</h3>
                    </div>
                    <div class="box4">
                        <h3>Charts</h3>
                    </div>
                    <div class="box5">
                        <h3>Trending</h3>
                    </div>
                    <div class="box6">
                        <h3>Discover</h3>
                    </div>
                    <div class="box7">
                        <h3>Spotify Singles</h3>
                    </div>
                    <div class="box8">
                        <h3>Decades</h3>
                    </div>
                </section>
                <!-- there is section for Gerns -->
                <p>Gerns</p>
                <section class="gerns">
                    <div class="box9">
                        <h3>Pop</h3>
                    </div>
                    <div class="box10">
                        <h3>Country</h3>
                    </div>
                     <div class="box11">
                        <h3>Hip-Hop</h3>
                    </div>
                    <div class="box12">
                        <h3>Rock</h3>
                    </div>
                    <div class="box13">
                        <h3>Indie</h3>
                    </div>
                    <div class="box14">
                        <h3>Punk</h3>
                    </div>
                    <div class="box15">
                        <h3>Metal</h3>
                    </div>
                    <div class="box16">
                        <h3>Instrumental</h3>
                    </div>
                </section>
            </main>
            <footer class="footer"></footer>
        </div>
    </div> 
</body>
</html>
