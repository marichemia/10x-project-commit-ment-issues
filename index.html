<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-top">
                <img src="images/library-icon.svg" alt="My Library" class="library-icon" />
                <span class="sidebar-title">My Library</span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/pins-icon.svg" alt="Pins icon" class="sidebar-icon">
                                <span class="sidebar-text">Pins</span>
                            </div>
                            <span><img src="images/arrow-icon.svg" alt="Arrow Icon" class="sidebar-arrow"></span>
                        </a>
                    </li>
                   
                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/playlists-icon.svg" alt="Playlists icon" class="sidebar-icon">
                                <span class="sidebar-text">Playlists</span>
                            </div>
                            <span><img src="images/arrow-icon.svg" alt="Arrow Icon" class="sidebar-arrow"></span>
                        </a>
                    </li>

                   <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/liked-songs-icon.svg" alt="Liked Songs icon" class="sidebar-icon">
                                <span class="sidebar-text">Liked Songs</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/saves-icon.svg" alt="Saves icon" class="sidebar-icon">
                                <span class="sidebar-text">Saves</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/albums-icon.svg" alt="Albums icon" class="sidebar-icon">
                                <span class="sidebar-text">Albums</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/folders-icon.svg" alt="Folders icon" class="sidebar-icon">
                                <span class="sidebar-text">Folders</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/podcasts-icon.svg" alt="Podcasts icon" class="sidebar-icon">
                                <span class="sidebar-text">Podcasts</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/audiobooks-icon.svg" alt="Audiobooks icon" class="sidebar-icon">
                                <span class="sidebar-text">Audiobooks</span>
                            </div>
                        </a>
                    </li>

                    <li class="sidebar-item">
                        <a href="#">
                            <div class="sidebar-item-icon-group">
                                <img src="images/artists-icon.svg" alt="Artists icon" class="sidebar-icon">
                                <span class="sidebar-text">Artists</span>
                            </div>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
        <div class="content-wrapper">
            <header class="header"></header>
            <main class="main-content"></main>
            <footer class="footer"></footer>
        </div>
    </div>
</body>
</html>
